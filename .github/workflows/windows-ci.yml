name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-format:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MyPlasm.Inspector.sln

      - name: Build Release
        run: dotnet build MyPlasm.Inspector.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test MyPlasm.Inspector.sln -c Release --no-build

      - name: Audit production native symbols
        shell: pwsh
        run: ./scripts/Test-ProductionNativeSafety.ps1

      - name: Verify formatting
        run: dotnet format MyPlasm.Inspector.sln --verify-no-changes --no-restore
